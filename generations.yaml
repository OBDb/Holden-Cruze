generations:
  - name: "First Generation (as rebadged Suzuki Ignis)"
    start_year: 2002
    end_year: 2006
    description: "The original vehicle sold as the Holden Cruze in Australia was a rebadged Suzuki Ignis, a subcompact crossover SUV. Announced as the Chevrolet YGM1 concept car at the 1999 Tokyo Motor Show, the production Cruze was derived from the Suzuki Ignis five-door hatchback. Despite Chevrolet branding, Holden executed most of the engineering work and devised the Cruze nameplate. Available with 1.3 or 1.5-liter engines coupled to five-speed manual or four-speed automatic transmissions, it was marketed as a light-duty SUV rather than a conventional passenger car. From 2002 through to 2006, this generation was sold in Australia and New Zealand before being discontinued."

  - name: "Second Generation (Global Compact Car)"
    start_year: 2009
    end_year: 2016
    description: "The Holden Cruze that most consumers recognize was part of GM's global compact car program, carrying the J300 internal designation. Initially imported from South Korea before transitioning to Australian production in 2011 at Holden's Elizabeth plant, the Cruze was built on GM's Delta II platform. Available as a four-door sedan and five-door hatchback (developed specifically by Holden for Australian tastes), it featured 1.4L and 1.6L turbocharged petrol engines and a 2.0L turbodiesel, paired with manual or automatic transmissions. The Australian-built Cruze represented an important diversification of Holden's local manufacturing beyond the larger Commodore. Production ended in 2016 as part of the phased closure of Holden's Australian manufacturing operations. In 2016, the Cruze sedan was restyled and renamed for the Australasian market as the Holden Astra Sedan."